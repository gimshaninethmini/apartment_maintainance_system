<!DOCTYPE html>
<html>
<head>
    <title>Update Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">Update Request Status</span>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-light">Back</a>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h4>Request: {{ assignment.request.title }}</h4>
                    </div>
                    <div class="card-body">
                        <p><strong>Tenant:</strong> {{ assignment.request.tenant.username }}</p>
                        <p><strong>Description:</strong> {{ assignment.request.description }}</p>
                        <p><strong>Current Status:</strong> {{ assignment.request.status }}</p>
                        
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label>New Status</label>
                                <select name="status" class="form-control" required>
                                    <option value="in_progress">Start Work (In Progress)</option>
                                    <option value="completed">Mark as Completed</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Notes</label>
                                <textarea name="notes" rows="3" class="form-control"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Update Status</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
