<!DOCTYPE html>
<html>
<head>
    <title>Edit Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-warning">
        <div class="container">
            <span class="navbar-brand">✏️ Edit Request</span>
            <a href="/dashboard/" class="btn btn-outline-dark">Back</a>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h4>Edit Maintenance Request</h4>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label>Title</label>
                                <input type="text" name="title" class="form-control" value="{{ request.title }}" required>
                            </div>
                            <div class="mb-3">
                                <label>Description</label>
                                <textarea name="description" rows="4" class="form-control" required>{{ request.description }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label>Priority</label>
                                <select name="priority" class="form-control">
                                    <option value="low" {% if request.priority == 'low' %}selected{% endif %}>Low</option>
                                    <option value="medium" {% if request.priority == 'medium' %}selected{% endif %}>Medium</option>
                                    <option value="high" {% if request.priority == 'high' %}selected{% endif %}>High</option>
                                    <option value="emergency" {% if request.priority == 'emergency' %}selected{% endif %}>Emergency</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-warning">Update Request</button>
                            <a href="/request/{{ request.id }}/" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
